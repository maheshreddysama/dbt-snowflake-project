version: 2

sources:
  - name: bronze
    database: PDF_DB
    schema: BRONZE
    description: "Raw PDF extractions landed by Python pipeline"
    tables:
      - name: raw_pdf_extracts
        description: "One row per PDF file. raw_payload is VARIANT JSON."
        columns:
          - name: extract_id
            description: "Unique ID auto-generated by Snowflake"
          - name: file_hash
            description: "MD5 of raw PDF bytes — used for deduplication"
          - name: raw_payload
            description: "Full extraction as VARIANT JSON including all pages"